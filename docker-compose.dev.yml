version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: expense_tracker_db_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: devpassword
      MYSQL_DATABASE: expense_tracker_pro
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: expense_tracker_app_dev
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: devpassword
      DB_NAME: expense_tracker_pro
      DB_PORT: 3306
      JWT_SECRET: dev_secret_change_in_production
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
      APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mysql_dev_data:
