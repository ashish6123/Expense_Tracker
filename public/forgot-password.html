<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password — Expense Tracker Pro</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">

<div class="auth-box">
  <div class="auth-brand"><span class="auth-brand-icon">🔐</span></div>
  <h1 class="auth-title">Forgot password?</h1>
  <p class="auth-sub">Enter your email and we'll send a reset code</p>

  <div id="alert" class="alert hidden"></div>

  <div class="field">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>

  <button class="btn btn-primary btn-full" id="send-btn" type="button">Send Reset Code</button>

  <p class="auth-footer"><a href="/">← Back to Sign In</a></p>
</div>

<script>
  document.getElementById('send-btn').addEventListener('click', async function(){
    var email = document.getElementById('email').value.trim();
    var al    = document.getElementById('alert');
    al.className='alert hidden';
    if(!email){ al.textContent='Please enter your email.'; al.className='alert alert-error'; return; }
    this.disabled=true; this.textContent='Sending…';
    try{
      var res  = await fetch('/api/auth/forgot-password',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
      var data = await res.json();
      al.textContent = data.message;
      al.className   = 'alert alert-'+(data.success?'success':'error');
      if(data.success){
        sessionStorage.setItem('pe',email);
        sessionStorage.setItem('pt','forgot_password');
        setTimeout(()=>location.href='/reset-password.html', 1600);
      } else { this.disabled=false; this.textContent='Send Reset Code'; }
    } catch(e){ al.textContent='Network error.'; al.className='alert alert-error'; this.disabled=false; this.textContent='Send Reset Code'; }
  });
  document.addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('send-btn').click(); });
</script>
</body>
</html>
