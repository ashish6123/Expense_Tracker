<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Categories — Expense Tracker Pro</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-head"><span class="sidebar-head-icon">💰</span><span class="sidebar-head-name">ExpenseTracker</span><button class="sidebar-x btn">✕</button></div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html"  class="nav-link"><span class="nav-icon">📊</span>Dashboard</a>
      <a href="/expenses.html"   class="nav-link"><span class="nav-icon">📋</span>Expenses</a>
      <a href="/analytics.html"  class="nav-link"><span class="nav-icon">📈</span>Analytics</a>
      <a href="/categories.html" class="nav-link active"><span class="nav-icon">🏷️</span>Categories</a>
      <a href="/profile.html"    class="nav-link"><span class="nav-icon">👤</span>Profile</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-chip"><div class="user-av" id="s-av"></div><div><div class="user-nm" id="s-nm"></div><div class="user-em" id="s-em"></div></div></div>
      <button class="btn-logout" id="logout-btn">Sign out</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="topbar-hamburger btn">☰</button>
      <span class="topbar-title">Categories</span>
      <div class="topbar-right"><button class="btn btn-primary btn-sm" id="add-btn">+ Add Category</button></div>
    </header>
    <div class="page">
      <div class="card"><div class="cat-grid" id="cat-grid"></div></div>
    </div>
  </div>
</div>

<!-- Add Category Modal -->
<div class="overlay hidden" id="cat-overlay">
  <div class="modal">
    <div class="modal-head"><h3>Add Category</h3><button class="modal-x btn" id="cat-x">✕</button></div>
    <div class="field"><label>Name</label><input type="text" id="cat-name" placeholder="e.g. Groceries"></div>
    <div class="two-field">
      <div class="field"><label>Color</label><input type="color" id="cat-color" value="#6366f1" style="height:42px;padding:4px 8px;cursor:pointer;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);width:100%"></div>
      <div class="field"><label>Icon (emoji)</label><input type="text" id="cat-icon" placeholder="🛒" maxlength="2"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline btn-sm" id="cat-cancel">Cancel</button>
      <button class="btn btn-primary btn-sm" id="cat-save">Add Category</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
var cats=[];
async function loadCats(){
  var r=await api('GET','/api/categories'); cats=r.categories||[]; render();
}
function render(){
  var g=document.getElementById('cat-grid');
  if(!cats.length){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-ico">🏷️</div><p>No categories yet</p></div>';return;}
  g.innerHTML=cats.map(c=>`
    <div class="cat-card" style="border-top:3px solid ${c.color}">
      <span class="cat-card-em">${c.icon||'💰'}</span>
      <div class="cat-card-nm">${c.name}</div>
      ${!c.is_default?`<button class="cat-del btn" onclick="delCat(${c.id})">✕</button>`:''}
    </div>`).join('');
}
function delCat(id){
  confirm('Delete this category? Expenses in it become uncategorized.', async ()=>{
    try{ var r=await api('DELETE','/api/categories/'+id); if(r.success){toast('Deleted.');loadCats();}else toast(r.message,'err'); }catch(e){toast('Delete failed.','err');}
  });
}

document.getElementById('add-btn').onclick   = ()=>openModal('cat-overlay');
document.getElementById('cat-x').onclick     = ()=>closeModal('cat-overlay');
document.getElementById('cat-cancel').onclick= ()=>closeModal('cat-overlay');
document.getElementById('cat-overlay').onclick=function(e){if(e.target===this)closeModal('cat-overlay');};
document.getElementById('cat-save').onclick  = async function(){
  var name=document.getElementById('cat-name').value.trim();
  if(!name){alert('Please enter a category name.');return;}
  this.disabled=true;this.textContent='Adding…';
  try{
    var r=await api('POST','/api/categories',{name,color:document.getElementById('cat-color').value,icon:document.getElementById('cat-icon').value||'💰'});
    if(r.success){closeModal('cat-overlay');document.getElementById('cat-name').value='';document.getElementById('cat-icon').value='';toast('Category added!');loadCats();}
    else toast(r.message,'err');
  }catch(e){toast('Failed.','err');}
  this.disabled=false;this.textContent='Add Category';
};

initApp().then(loadCats);
</script>
</body>
</html>
