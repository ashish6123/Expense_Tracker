<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password — Expense Tracker Pro</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">

<div class="auth-box">
  <div class="auth-brand"><span class="auth-brand-icon">🔑</span></div>
  <h1 class="auth-title">Reset password</h1>
  <p class="auth-sub">Enter the OTP we emailed you, then set your new password</p>

  <div id="alert" class="alert hidden"></div>

  <div class="otp-row" id="otp-row">
    <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
    <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
    <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
    <span class="otp-sep">—</span>
    <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
    <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
    <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
  </div>

  <div class="field">
    <label for="np">New password</label>
    <div class="pw-wrap">
      <input type="password" id="np" placeholder="Min. 8 characters">
      <button class="pw-eye" id="pw-eye" type="button">👁</button>
    </div>
  </div>

  <div class="field">
    <label for="cp">Confirm new password</label>
    <input type="password" id="cp" placeholder="Repeat new password">
  </div>

  <button class="btn btn-primary btn-full" id="reset-btn" type="button">Reset Password</button>

  <p class="auth-footer" style="margin-top:14px">
    Didn't get the code?
    <button class="link" id="resend-btn" type="button">Resend</button>
    <span id="cd"></span>
  </p>
  <p class="auth-footer"><a href="/">← Back to login</a></p>
</div>

<script>
  var email = sessionStorage.getItem('pe');
  if(!email) location.href='/forgot-password.html';

  document.getElementById('pw-eye').addEventListener('click',function(){
    var i=document.getElementById('np'); i.type=i.type==='password'?'text':'password'; this.textContent=i.type==='password'?'👁':'🙈';
  });

  var inputs=document.querySelectorAll('.otp-input');
  inputs.forEach(function(inp,i){
    inp.addEventListener('input',function(){ this.value=this.value.replace(/\D/g,'').slice(-1); this.classList.toggle('filled',!!this.value); if(this.value&&i<inputs.length-1)inputs[i+1].focus(); });
    inp.addEventListener('keydown',function(e){ if(e.key==='Backspace'&&!this.value&&i>0)inputs[i-1].focus(); });
    inp.addEventListener('paste',function(e){ var t=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,''); if(t.length>=6){inputs.forEach(function(d,j){d.value=t[j]||'';d.classList.toggle('filled',!!t[j]);});inputs[5].focus();e.preventDefault();} });
  });
  function getOTP(){ return Array.from(inputs).map(d=>d.value).join(''); }

  document.getElementById('reset-btn').addEventListener('click',async function(){
    var otp=getOTP(), np=document.getElementById('np').value, cp=document.getElementById('cp').value;
    var al=document.getElementById('alert'); al.className='alert hidden';
    if(otp.length!==6){al.textContent='Enter all 6 OTP digits.';al.className='alert alert-error';return;}
    if(np.length<8){al.textContent='Password must be at least 8 characters.';al.className='alert alert-error';return;}
    if(np!==cp){al.textContent='Passwords do not match.';al.className='alert alert-error';return;}
    this.disabled=true;this.textContent='Resetting…';
    try{
      var res=await fetch('/api/auth/reset-password',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,otp,newPassword:np})});
      var data=await res.json();
      if(data.success){ al.textContent='Password reset! Redirecting…'; al.className='alert alert-success'; sessionStorage.removeItem('pe'); sessionStorage.removeItem('pt'); setTimeout(()=>location.href='/',2000); }
      else{ al.textContent=data.message||'Reset failed.';al.className='alert alert-error';this.disabled=false;this.textContent='Reset Password'; }
    }catch(e){al.textContent='Network error.';al.className='alert alert-error';this.disabled=false;this.textContent='Reset Password';}
  });

  var timer=null;
  function startCD(){
    var btn=document.getElementById('resend-btn'),cd=document.getElementById('cd');
    btn.disabled=true;btn.style.opacity='0.5';var s=60;cd.textContent=' ('+s+'s)';
    if(timer)clearInterval(timer);
    timer=setInterval(function(){s--;cd.textContent=' ('+s+'s)';if(s<=0){clearInterval(timer);btn.disabled=false;btn.style.opacity='1';cd.textContent='';}},1000);
  }
  startCD();
  document.getElementById('resend-btn').addEventListener('click',async function(){
    var al=document.getElementById('alert');
    try{ var res=await fetch('/api/auth/resend-otp',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,type:'forgot_password'})}); var data=await res.json(); al.textContent=data.message;al.className='alert alert-'+(data.success?'success':'error');if(data.success)startCD(); }catch(e){}
  });
</script>
</body>
</html>
